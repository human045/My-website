<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Akhilesh Dixit</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ece4;
      --ink: #1a1a18;
      --accent: #c0392b;
      --muted: #7a7570;
      --card: #e8e2d8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
    }

    /* Left panel */
    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4rem 3rem;
      position: relative;
      opacity: 0;
      transform: translateX(-30px);
      animation: slideIn 0.9s ease forwards 0.2s;
    }

    .photo-wrapper {
      position: relative;
      width: 280px;
      height: 340px;
    }

    .photo-bg {
      position: absolute;
      inset: 12px -12px -12px 12px;
      background: var(--accent);
      border-radius: 2px;
      opacity: 0.15;
    }

    .photo-frame {
      position: relative;
      width: 100%;
      height: 100%;
      border: 1.5px solid rgba(26,26,24,0.15);
      border-radius: 2px;
      overflow: hidden;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-placeholder {
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      color: var(--muted);
      opacity: 0.4;
      user-select: none;
    }

    .photo-label {
      margin-top: 1.2rem;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
    }

    /* Right panel */
    .right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 3.5rem 4rem 2rem;
      opacity: 0;
      transform: translateX(30px);
      animation: slideIn 0.9s ease forwards 0.4s;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 5vw, 4.2rem);
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 1.5px;
      background: var(--ink);
      margin: 1.4rem 0;
      opacity: 0.3;
    }

    .tagline {
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--muted);
      font-weight: 300;
      max-width: 360px;
      margin-bottom: 0.6rem;
    }

    .tagline strong {
      color: var(--ink);
      font-weight: 500;
    }

    .sub-tagline {
      font-size: 0.82rem;
      color: var(--muted);
      opacity: 0.7;
      margin-bottom: 2.4rem;
      font-style: italic;
      font-family: 'Playfair Display', serif;
    }

    /* CTA */
    .cta-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--ink);
      color: var(--bg);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.85rem 1.6rem;
      border-radius: 1px;
      transition: background 0.2s, transform 0.2s;
      font-weight: 500;
    }

    .btn-primary:hover {
      background: var(--accent);
      transform: translateY(-2px);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--ink);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
      font-weight: 400;
    }

    .btn-secondary:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Social links */
    .social-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.9rem;
      opacity: 0.7;
    }

    .socials {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(26,26,24,0.18);
      border-radius: 1px;
      color: var(--ink);
      text-decoration: none;
      transition: all 0.2s;
      background: transparent;
    }

    .social-link:hover {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
      transform: translateY(-3px);
    }

    .social-link svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
    }

    /* Bottom corner text */
    .corner-text {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.4;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    /* Decorative line */
    .deco-line {
      position: fixed;
      top: 0;
      left: 50%;
      width: 1px;
      height: 100vh;
      background: linear-gradient(to bottom, transparent, rgba(26,26,24,0.08), transparent);
      pointer-events: none;
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    /* Mobile */
    @media (max-width: 700px) {
      .page {
        grid-template-columns: 1fr;
        padding: 3rem 2rem;
        gap: 2.5rem;
      }
      .left {
        padding: 0;
        animation: fadeUp 0.9s ease forwards 0.2s;
      }
      .right {
        padding: 0;
        animation: fadeUp 0.9s ease forwards 0.4s;
      }
      .deco-line { display: none; }
      .corner-text { display: none; }
      h1 { font-size: 2.8rem; }
      .photo-wrapper { width: 220px; height: 270px; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
